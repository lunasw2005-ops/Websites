.dropdown {
  position: relative;
}
.dropbtn {
    background-color: #04AA6D;
    color: white;
    padding: 14px 28px; /* Controls the size of the button */
    font-size: 16px;    /* Controls the size of the text */

    width: 100%;        /* Makes the button full width of its parent */
}
.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f9f9f9;
  min-width: 200px;
  min-height: 120px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  padding: 120px 150px;
font: 20px
}

.dropdown:hover .dropdown-content {
  display: block;
}
.dropdown {
  width: 100px; /* Needs a specific width to use margin: auto */
  margin-left: auto;
  margin-right: auto;
  display: block; /* Ensures it acts as a block-level element */
}
